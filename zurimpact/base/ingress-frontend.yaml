apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zurimpact-frontend
spec:
  rules:
  - host: .pm4.init-lab.ch # use kustomize here
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-svc
            port:
              number: 80
