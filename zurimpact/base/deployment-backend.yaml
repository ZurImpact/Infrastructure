apiVersion: apps/v1
kind: Deployment
metadata:
  name: zurimpact-backend
  labels:
    app: backend
spec:
  selector:
    matchLabels:
      app: backend
  replicas: 1
  revisionHistoryLimit: 1
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: backend
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
      - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: zurimpact-backend
        image: ghcr.io/zurimpact/zurimpact-backend:dev-latest
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 100m
            memory: 1Gi
          limits:
            cpu: 2
            memory: 4Gi
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 15
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 15
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
          periodSeconds: 10
        env:
        - name: DB_URL
          value: jdbc:postgresql://localhost:5432/dev_db
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-user-secret
              key: POSTGRES_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-user-secret
              key: POSTGRES_PASSWORD
        - name: SPRING_MAIL_HOST
          value: "mailpit-smtp"
        - name: SPRING_MAIL_PORT
          value: "1025"
        - name: SPRING_MAIL_PROTOCOL
          value: smtp
        - name: SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH
          value: "false"
        - name: SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE
          value: "false"
        - name: APP_MAIL_FROM
          value: no-reply@zurimpact.local
        - name: APP_BASE_URL
          value: "https://staging.zurimpact.com"
        ports:
        - containerPort: 8080
          name: backend
