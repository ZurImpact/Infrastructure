apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: zi-staging

resources:
- ../../base

images:
- name: ghcr.io/zurimpact/zurimpact-backend
  newTag: dev-f38ce6c
- name: ghcr.io/zurimpact/zurimpact-frontend
  newTag: dev-f38ce6c

patches:
- path: deployment-patch.yaml

- target:
    kind: Ingress
    name: zurimpact-frontend
  patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: zurimpact-staging.pm4.init-lab.ch
