# deployment-patch.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zurimpact-backend
spec:
  template:
    spec:
      containers:
      - name: zurimpact-backend
        env:
        - name: DB_URL
          value: jdbc:postgresql://postgres-zi-prod:5432/zurimpact
        - name: SPRING_MAIL_HOST
          value: "mailpit-prod-smtp"
        - name: APP_BASE_URL
          value: "https://zurimpact.pm4.init-lab.ch"
