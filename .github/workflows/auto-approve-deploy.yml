name: Auto-approve deploy PRs

on:
  pull_request:
    branches: [main]
    paths:
      - "zurimpact/overlays/staging/**"

jobs:
  auto-approve:
    if: github.actor == 'github-actions[bot]' || startsWith(github.head_ref, 'deploy/zurimpact-')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Approve PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr review "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --approve
